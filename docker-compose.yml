services:
  postgres:
    image: postgres:16-alpine
    container_name: pm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pmplatform}
      POSTGRES_USER: ${POSTGRES_USER:-pmadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
      - ./postgres/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./postgres/constraints.sql:/docker-entrypoint-initdb.d/02_constraints.sql:ro
      - ./postgres/indexes.sql:/docker-entrypoint-initdb.d/03_indexes.sql:ro
      - ./postgres/triggers.sql:/docker-entrypoint-initdb.d/04_triggers.sql:ro
      - ./postgres/seed.sql:/docker-entrypoint-initdb.d/05_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pmadmin} -d ${POSTGRES_DB:-pmplatform}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - tasklynx_net

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tasklynx_web
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://pmadmin:devpassword@postgres:5432/pmplatform}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/_next/static || curl -f http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - next_cache:/app/.next
    networks:
      - tasklynx_net

  verify:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tasklynx_verify
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://pmadmin:devpassword@postgres:5432/pmplatform}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "-lc", "npm run verify"]
    restart: 'no'
    networks:
      - tasklynx_net

networks:
  tasklynx_net:
    driver: bridge

volumes:
  postgres_data:
  next_cache:
